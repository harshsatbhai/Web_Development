<!DOCTYPE html>
<html lang = "en">
   <head>
      <meta charset = "UTF-8">
      <meta name = "viewport" content="width = device-width, initial-scale = 1.0">
      <title> Cards </title>
      <link rel = "stylesheet" href = "styles.css"> 
   </head>
   <body>
      <div class = "card-container">
         <div class = "card">
            <img class = "burger1" src = "./public/images/Hamburger.png" alt = "Hamburger"> 
            <div class = "card-content">
               <h3 class = "heading1"> Hamburger </h3>
               <p> Juicy beef, crisp lettuce, ripe tomato, and melted cheese stacked between golden buns </p>
            </div>
            <p class = "price"> $8 <p>
            <img class = "bag" src = "./public/images/grocery_bag.png" alt = "Grocery Bag" width = "21" height = "21">  
            <button type = "button"> Add to cart </button>  
         </div>
         <div class = "card">
            <img class = "burger2" src = "./public/images/Chicken Burger.png" alt = "Chicken Burger"> 
            <div class = "card-content">
               <h3 class = "heading2"> Chicken Burger </h3>
               <p> Crispy chicken with fresh lettuce, ripe tomato, and creamy mayo </p>
            </div>
            <p class = "price"> $5 <p>
            <img class = "bag" src = "./public/images/grocery_bag.png" alt = "Grocery Bag" width = "21" height = "21">  
            <button type = "button"> Add to cart </button>
         </div>
         <div class = "card">
            <img class = "burger3" src = "./public/images/Bacon Cheeseburger.png" alt = "Bacon Cheeseburger"> 
            <div class = "card-content">
               <h3 class = "heading3"> Bacon Cheeseburger </h3>
               <p> A juicy cheese-stuffed patty topped with smoky bacon and melted goodness in every bite </p>
            </div>
            <p class = "price"> $12 <p>
            <img class = "bag" src = "./public/images/grocery_bag.png" alt = "Grocery Bag" width = "21" height = "21">  
            <button type = "button"> Add to cart </button>
         </div> 
      </div>
   </body>
</html>
