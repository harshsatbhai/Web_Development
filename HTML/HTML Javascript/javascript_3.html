<!DOCTYPE html>
<html> 
   <head> 
      <title> Javascript Function </title>
   </head> 
   
   <body> 
      <button type = "button" onclick = "myFunction()"> Click Me! </button>
      <p id = "id"> This is a demonstration </p>
      
      <script> 
         function myFunction(){
            document.getElementById("id").innerHTML = "Hello JavaScript!";      
         }  
      </script>
   </body>
</html>
