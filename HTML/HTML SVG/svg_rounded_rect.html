<!DOCTYPE html>
<html> 
   <body>
      <svg width = "400" height = "400">
         <!-- The rx and ry attributes are used to define the radius of the corners of the rectangle -->
         <!-- The rx attribute defines the x-radius, or the width of the rounding, while the ry attribute defines the y-radius, or the height of the rounding -->
         <rect x = "10" y = "10" rx = "20" ry = "20" width = "300" height = "200" stroke = "black" stroke-width = "2" fill = "red" opacity = "0.7">   
      </svg>   
   </body>   
</html>
