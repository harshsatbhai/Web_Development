<!DOCTYPE html>
<html>
   <body>
      <!-- SVG stands for Scalable Vector Graphics -->
      <!-- SVG defines vector-based graphics in XML, which can be directly embedded in HTML pages -->
      <!-- The HTML <svg> element is a container for SVG graphics -->
      <!-- SVG graphics are scalable, and do not lose any quality if they are zoomed or resized -->
      <svg width = "100" height = "100">
         <!-- cx is position of centre of circle in x-axis, cy is position of centre of circle in y-axis --> 
         <circle cx = "40" cy = "50" r = "30" stroke = "red" stroke-width = "3" fill = "yellow">       
      </svg>    
   </body>   
</html>
