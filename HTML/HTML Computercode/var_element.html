<!DOCTYPE html>
<html>
   <head> 
      <title> var element </title>
   </head>
   <body>
      <!-- The HTML <var> element  is used to define a variable in programming or in a mathematical expression -->
      <p> The area of a rectangle is: <var> l </var> x <var> w </var>, 
      where <var> l </var> is the length, and <var> w </var> is the width of the rectangle. </p>
   </body>
</html>
