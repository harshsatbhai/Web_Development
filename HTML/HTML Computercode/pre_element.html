<!DOCTYPE html>
<html> 
   <head> 
      <title> preserve line-breaks </title>   
   </head>
   
   <body>
      <!-- To preserve extra whitespace and line-breaks, you can put the <code> element inside a <pre> element --> 
      <pre> 
         <code> 
         x = 10;
         y = 20;
         z = x + y;
         </code>   
      </pre>   
   </body>
</html>
