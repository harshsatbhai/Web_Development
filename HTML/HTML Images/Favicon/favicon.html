<!DOCTYPE html>
<html> 
   <head> 
      <title> Favicon </title>
      <!-- <link> element is used to insert a favicon -->
      <!-- The standard resolution for a favicon should be 16x16 pixels -->
      <link rel = "icon" type = "image/x-icon" href = "./html5.png">
   </head>
   
   <body> 
      <p> A favicon is a small image displayed next to the page title in the browser tab. </p>
   </body>
</html>
