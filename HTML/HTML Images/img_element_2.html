<!DOCTYPE html>
<html> 
   <head> 
      <title> Image Element </title>
   </head>
   
   <body> 
      <!-- The 'alt' attribute provides an alternate text for an image -->
      <!-- The 'width' and 'height' attributes always define the width and height of the image in pixels -->
      <!-- 'width' and 'height' attributes can be used to resize an image -->
      <img src = "https://moderncarcollector.com/wp-content/uploads/2024/06/Screen-Shot-2024-06-10-at-6.04.51-PM.png" 
      alt = "koenigsegg jesko" width = "500" height = "281"> 
   </body>
</html>
