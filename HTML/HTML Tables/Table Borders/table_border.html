<!DOCTYPE html>
<html>
   <head>   
      <title> Table Border </title>
      <style> 
         table, th, td{
            /* Adding border to table, th, td */
            border: 1px solid black;      
         }
      </style>
   </head>
   <body>
      <table style = "width: 100%;">
         <tr>
            <th> Name </th>
            <th> ID </th> 
            <th> Age </th>
         </tr>
         <tr>
            <td> ABC </td>
            <td> 123456 </td>
            <td> 18 </td>
         </tr>
         <tr>
            <td> XYZ </td>
            <td> 908942 </td>
            <td> 20 </td>
         </tr>
         <tr>
            <td> RST </td>
            <td> 189211 </td>
            <td> 21 </td>
         </tr>
      </table>
   </body>
</html>
