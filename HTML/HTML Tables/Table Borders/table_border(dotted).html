<!DOCTYPE html>
<html>
   <head>
      <title> Dotted Table Border </title>
      <style>
         table, th, td{
            /* With the border-style property, you can set the appearance of the border */
            border-style: dotted;
         }
      </style>
   </head>
   <body>
      <table style = "width: 100%;">
         <tr>
            <th> Name </th>
            <th> ID </th> 
            <th> Age </th>
         </tr>
         <tr>
            <td> ABC </td>
            <td> 123456 </td>
            <td> 18 </td>
         </tr>
         <tr>
            <td> XYZ </td>
            <td> 908942 </td>
            <td> 20 </td>
         </tr>
         <tr>
            <td> RST </td>
            <td> 189211 </td>
            <td> 21 </td>
         </tr>
      </table>
   </body>
</html>
