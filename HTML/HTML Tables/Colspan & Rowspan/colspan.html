<!DOCTYPE html>
<html>
   <head>
      <title> colspan </title>
      <style>
         table, th, td{
            border: 1px solid black;
            border-collapse: collapse;
         }
      </style>
   </head>

   <body>
      <table style = "width: 100%;">
         <tr>
            <!-- To make a cell span over multiple columns, use the colspan attribute -->
            <!-- The value of the colspan attribute represents the number of columns to span --> 
            <th style = "width: 70%" colspan = "2"> Name </th>
            <th> Age </th>
         </tr>
         <tr>
            <td> Name1 </td>
            <td> Name4 </td>
            <td> 18 </td>
         </tr>
         <tr>
            <td> Name2 </td>
            <td> Name5 </td>
            <td> 20 </td>
         </tr>
         <tr>
            <td> Name3 </td>
            <td> Name6 </td>
            <td> 21 </td>
         </tr>
      </table>
   </body>
</html>
