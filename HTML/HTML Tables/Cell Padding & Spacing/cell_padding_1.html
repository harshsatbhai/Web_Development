<!DOCTYPE html>
<html>
   <head>
      <title> cell padding </title>
      <style>
         table, th, td{
            border: 1px solid black;
            border-collapse: collapse;
         }
         th, td{
            /* Cell padding is the space between the cell edges and the cell content, by default the padding is set to 0 */
            padding: 15px;
         }
      </style>
   </head>

   <body>
      <table style = "width: 100%;">
         <tr>
            <th style = "width: 50%"> Name </th>
            <th> ID </th> 
            <th> Age </th>
         </tr>
         <tr>
            <td> ABC </td>
            <td> 123456 </td>
            <td> 18 </td>
         </tr>
         <tr>
            <td> XYZ </td>
            <td> 908942 </td>
            <td> 20 </td>
         </tr>
         <tr>
            <td> RST </td>
            <td> 189211 </td>
            <td> 21 </td>
         </tr>
      </table>
   </body>
</html>
