<!DOCTYPE html>
<html>
   <head>
      <title> cell padding </title>
      <style>
         table, th, td{
            border: 1px solid black;
            border-collapse: collapse;
         }
         th, td{
            /* Add padding to the other sides with the padding-top, padding-bottom, padding-left, and padding-right properties */
            padding-top: 10px;
            padding-bottom: 20px;
            padding-left: 15px;
            padding-right: 20px; 
         }
      </style>
   </head>

   <body>
      <table style = "width: 100%;">
         <tr>
            <th style = "width: 50%"> Name </th>
            <th> ID </th> 
            <th> Age </th>
         </tr>
         <tr>
            <td> ABC </td>
            <td> 123456 </td>
            <td> 18 </td>
         </tr>
         <tr>
            <td> XYZ </td>
            <td> 908942 </td>
            <td> 20 </td>
         </tr>
         <tr>
            <td> RST </td>
            <td> 189211 </td>
            <td> 21 </td>
         </tr>
      </table>
   </body>
</html>
