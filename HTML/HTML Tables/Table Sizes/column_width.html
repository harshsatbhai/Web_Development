<!DOCTYPE html>
<html>
   <head>
      <title> column width </title>
      <style>
         table, th, td{
            border: 1px solid black;
            border-collapse: collapse;
         }
      </style>
   </head>

   <body>
      <table style = "width: 100%;">
         <tr>
            <!-- To set the size of a specific column, add the style attribute on a <th> or <td> element -->
            <th style = "width: 50%"> Name </th>
            <th> ID </th> 
            <th> Age </th>
         </tr>
         <tr>
            <td> ABC </td>
            <td> 123456 </td>
            <td> 18 </td>
         </tr>
         <tr>
            <td> XYZ </td>
            <td> 908942 </td>
            <td> 20 </td>
         </tr>
         <tr>
            <td> RST </td>
            <td> 189211 </td>
            <td> 21 </td>
         </tr>
      </table>
   </body>
</html>
