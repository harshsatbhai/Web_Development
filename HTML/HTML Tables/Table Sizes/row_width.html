<!DOCTYPE html>
<html>
   <head>
      <title> row width </title>
      <style>
         table, th, td{
            border: 1px solid black;
            border-collapse: collapse;
         }
      </style>
   </head>

   <body>
      <table style = "width: 100%;">
         <tr>
            <th> Name </th>
            <th> ID </th> 
            <th> Age </th>
         </tr>
         <!-- To set the height of a specific row, add the style attribute on a table row element -->
         <tr style = "height: 50px;">
            <td> ABC </td>
            <td> 123456 </td>
            <td> 18 </td>
         </tr>
         <tr>
            <td> XYZ </td>
            <td> 908942 </td>
            <td> 20 </td>
         </tr>
         <tr>
            <td> RST </td>
            <td> 189211 </td>
            <td> 21 </td>
         </tr>
      </table>
   </body>
</html>
