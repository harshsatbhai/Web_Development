<!DOCTYPE html>
<html>
   <head>
      <title> table caption </title>
      <style>
         table, th, td{
            border: 1px solid black;
            border-collapse: collapse;
         }
      </style>
   </head>

   <body>
      <table style = "width: 100%;">
         <!-- caption serves as a heading for the entire table -->
         <caption> Student Info </caption>
         <tr>
            <th> Name </th>
            <th> ID </th>
            <th> Age </th>
         </tr>
         <tr>
            <td> ABC </td>
            <td> 123456 </td>
            <td> 18 </td>
         </tr>
         <tr>
            <td> XYZ </td>
            <td> 908942 </td>
            <td> 20 </td>
         </tr>
         <tr>
            <td> RST </td>
            <td> 189211 </td>
            <td> 21 </td>
         </tr>
      </table>
   </body>
</html>
