<!DOCTYPE html>
<html>
   <head>
      <title> horizontal dividers </title>
      <style>
         table{
            border-collapse: collapse;   
         }
         th, td{
            border-bottom: 1px solid #bbbbbb;
            text-align: left;
            padding-left: 15px;
            padding-top: 7px;
            padding-bottom: 8px;
         }
      </style>
   </head>

   <body>
      <table style = "width: 100%;">
         <tr>
            <th> Name </th>
            <th> ID </th> 
            <th> Age </th>
         </tr>
         <tr>
            <td> ABC </td>
            <td> 293801 </td> 
            <td> 18 </td>
         </tr>
         <tr>
            <td> XYZ </td>
            <td> 783627 </td> 
            <td> 20 </td>
         </tr>
         <tr>
            <td> RST </td>
            <td> 392812 </td> 
            <td> 21 </td>
         </tr>
      </table>
   </body>
</html>
