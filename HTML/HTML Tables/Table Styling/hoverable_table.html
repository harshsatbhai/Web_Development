<!DOCTYPE html>
<html>
   <head>
      <title> hoverable table </title>
      <style>
         table{
            border-spacing: 0px;   
         }
         tr:first-child ~ tr:hover{
            background-color: #D6EEEE;
         }
         th, td{
            border-bottom: 1px solid #bbbbbb;
            padding: 10px;
            text-align: left;
         }
         th{
            font-size: 18px;
         }
      </style>
   </head>

   <body>
      <table style = "width: 100%;">
         <tr>
            <th> Name </th>
            <th> ID </th> 
            <th> Age </th>
         </tr>
         <tr>
            <td> ABC </td>
            <td> 123456 </td>
            <td> 18 </td>
         </tr>
         <tr>
            <td> XYZ </td>
            <td> 908942 </td>
            <td> 20 </td>
         </tr>
         <tr>
            <td> RST </td>
            <td> 189211 </td>
            <td> 21 </td>
         </tr>
      </table>
   </body>
</html>
