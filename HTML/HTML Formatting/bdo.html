<!DOCTYPE html>
<html> 
   <head> 
      <title> </title>
   </head>
   
   <body>
      <!-- bdo stands for 'Bi-Directional Override'. It is used to override the current text direction -->
      <!-- It has attribute 'dir'(direction) with value 'rtl' which means from right to left --> 
      <bdo dir = "rtl"> This is a statement </bdo>
   </body>
</html>
