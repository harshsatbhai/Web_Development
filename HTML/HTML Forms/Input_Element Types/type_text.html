<!DOCTYPE html>
<html>
   <head> 
      <title> type text </title>   
   </head>

   <body>
      <!-- An HTML form is used to collect user input, the user input is most often sent to a server for processing -->
      <!-- The HTML <form> element is used to create an HTML form for user input -->
      <!-- The <form> element is a container for different types of input elements, such as: text fields, checkboxes, 
      radio buttons, submit buttons, etc -->     
      <form>
         First Name: <br>
         <!-- if 'type' attribute has value 'text' then input element displays a single-line text input field -->
         <!-- the default width of an input field is 20 characters -->  
         <input type = "text" id = "fname"><br><br>
         Last Name: <br>
         <input type = "text" id = "lname">   
      </form>         
   </body>
</html>
