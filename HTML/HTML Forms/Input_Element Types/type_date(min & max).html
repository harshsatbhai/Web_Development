<!DOCTYPE html>
<html> 
   <head> 
      <title> type date(min & max) </title>
   </head>
   
   <body> 
      <form action = "http://localhost/php/">
         <label for = "date1"> Enter a date before 2000-01-01: </label><br> 
         <input type = "date" id = "date1" name = "date1" min = "1970-01-01"><br><br>
         <label for = "date2"> Enter a date after 2005-01-01: </label><br> 
         <input type = "date" id = "date2" name = "date2" max = "2025-01-01"><br><br>
         <input type = "submit" value = "Submit">
      </form>         
   </body>
</html>
