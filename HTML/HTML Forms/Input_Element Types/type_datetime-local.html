<!DOCTYPE html>
<html>
   <head> 
      <title> type datetime-local </title>
   </head>
   
   <body>
      <form action = "http://localhost/php/" target = "_blank">
         <label for = "bday"> Birthday(date & time): </label>
         
         <!-- The <input type = "datetime-local"> specifies a date and time input field, with no time zone -->
         <input type = "datetime-local" id = "bday" name = "bday"><br><br>
         <input type = "submit" value = "Submit"> 
      </form>
   </body>
</html>
