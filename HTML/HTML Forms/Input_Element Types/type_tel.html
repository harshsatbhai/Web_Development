<!DOCTYPE html>
<html>   
   <head> 
      <title> type tel </title>
   </head>
   
   <body> 
      <form action = "http://localhost/php/"> 
         <label for = "phone">  Enter your telephone number: </label>
         <!-- The <input type = "tel"> is used for input fields that should contain a telephone number -->
         <input type = "tel" id = "phone" name = "phone" pattern = "[0-9]{3}-[0-9]{2}-[0-9]{3}" placeholder = "Eg: 123-45-678" required>
         <input type = "submit" value = "Submit">
      </form>   
   </body>
</html>
