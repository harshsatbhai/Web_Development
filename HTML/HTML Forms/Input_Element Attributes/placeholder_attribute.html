<!DOCTYPE html>
<html>
   <head> 
      <title> placeholder attribute </title>
   </head>
   <body>
      <form action = "http://localhost/php/">
      <label for = "email"> Enter your email: </label>
      
      <!-- The input placeholder attribute specifies a short hint that describes the expected value of an input field -->
      <!-- The short hint is displayed in the input field before the user enters a value -->
      <!-- The placeholder attribute works with the following input types: text, search, url, number, tel, email and password -->
      <input type = "email" id = "email" name = "email" placeholder = "Example@gmail.com" size = "35" maxlength = "40"><br><br>
      <input type = "submit" value = "Submit">
      </form>
   </body>
</html>
