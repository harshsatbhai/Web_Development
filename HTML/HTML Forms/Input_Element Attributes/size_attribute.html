<!DOCTYPE html>
<html>
   <head> 
      <title> size attribute </title>
   </head> 
   <body>
      <form action="http://localhost/php/">
      <label for = "address"> Residential Address: </label><br>
      <!-- The input size attribute specifies the width, in characters, of an input field -->
      <!-- The default value for size is 20 -->
      <!-- The size attribute works with the following input types: text, search, tel, url, email, and password -->
      <input type = "text" id = "address" name = "address" size = "100"><br><br>
      <label for = "pin"> PIN: </label><br>
      <input type = "number" id = "pin" name = "pin" style = "width: 70px;"><br><br>
      <input type = "submit" value = "Submit">
      </form>
   </body>
</html>
