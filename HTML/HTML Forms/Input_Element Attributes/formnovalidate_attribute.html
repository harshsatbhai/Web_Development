<!DOCTYPE html>
<html>
   <head> 
      <title> formnovalidate attribute </title>   
   </head>
   <body>
      <form action = "http://localhost/php/">
      <label for = "email"> Enter your email: </label>
      <input type = "email" id = "email" name = "email"><br><br>
      <input type = "submit" value = "Submit">
      <!-- The input formnovalidate attribute specifies that an <input> element should not be validated when submitted -->
      <!-- formnovalidate attribute overrides the novalidate attribute of the <form> element -->
      <input type = "submit" formnovalidate = "formnovalidate" value = "Submit without validation">
      </form>
   </body>
</html>
