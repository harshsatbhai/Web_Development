<!DOCTYPE html>
<html>
   <head> 
      <title> formenctype attribute </title>
   </head>
   <body>
      <form action = "http://localhost/php/" method = "post">
      <label for = "fname"> First name: </label>
      <input type = "text" id = "fname" name = "fname"><br><br>
      <input type = "submit" value = "Submit">
      <!-- The input formenctype attribute specifies how the form-data should be encoded when submitted -->
      <!-- formenctype attribute overrides the enctype attribute of the <form> element -->
      <!-- The formenctype attribute works with the following input types: submit and image -->
      <input type = "submit" formenctype = "multipart/form-data" value = "Submit as Multipart/form-data">
      </form>
   </body>
</html>
