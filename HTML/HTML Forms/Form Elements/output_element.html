<!DOCTYPE html>
<html>
   <head> 
      <title> output element </title>
   </head>
   
   <body> 
      <form action = "http://localhost/php/" oninput = "x.value = parseInt(a.value) + parseInt(b.value)">
         <input type = "number" id = "a" name = "a" style = "width: 70px;">
         +
         <input type = "number" id = "b" name = "b" style = "width: 70px;">
         =
         <!-- The <output> element represents the result of a calculation -->
         <output name = "x" for = "a b"> </output><br><br> 
         
         <input type = "submit" value = "Submit">
      </form>
   </body>
</html>
