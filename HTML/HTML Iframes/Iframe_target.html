<!DOCTYPE html>
<html> 
   <head> 
      <title> iframe target </title>
   </head>
   
   <body>
      <!-- An iframe can be used as the target frame for a link -->
      <iframe src = "./test2.htm" name = "iframe" height = "400" width = "800" title = "Iframe Example"></iframe>
      <!-- The target attribute of the link must refer to the name attribute of the iframe -->
      <a href = "https://www.koenigsegg.com/home" target = "iframe"> koenigsegg official website </a>
   </body>
</html>
