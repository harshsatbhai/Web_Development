<!DOCTYPE html>
<html>
    <head> 
        <meta charset = "UTF-8">
        <title> Unordered List Nesting </title>
    </head> 
    
    <body>
        <!-- <ul> element creates unordered list -->
        <ul>
            <!-- <li> element stands for 'list item' -->
            <li> Wake up and brush teeth </li>
            <li> Drink 500ml warm water </li>
            <li> Do yoga for an hour </li>
            <li> Make Omelette
                <ul> 
                    <li> Whisk eggs with milk </li>
                    <li> Add butter to pan </li>
                    <li> Add in eggs and stir </li>
                    <li> When solid add salt </li>
                </ul>
            </li>
            <li> Start Work </li>
        </ul>    
    </body>
</html>
