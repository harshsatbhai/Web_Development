<!DOCTYPE html>
<html lang = "en">
   <head>
      <meta charset = "UTF-8"/>
      <title> Flexbox </title>
      <style>
         .container{
            display: flex;
            flex-direction: column;
         }
         .container > *{
            flex-basis: 100px;   
         }
         .red{
            background-color: red;   
         }
         .yellow{
            background-color: yellow;
         }
         .blue{
            background-color: blue;
         }      
      </style> 
   </head>
   
   <body> 
      <div class = "container">
         <div class = "red"> Red </div>
         <div class = "yellow"> Yellow </div>
         <div class = "blue"> Blue </div>    
      </div>         
   </body>
</html>
