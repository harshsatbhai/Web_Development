<!DOCTYPE html>
<html lang = "en"> 
   <head>
      <meta charset = "UTF-8"/>
      <title> Flexbox Pricing Table </title>
      <style>
         body{
            font-family: 'Baloo 2', cursive;  
         }
         .pricing-container{
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 2rem;
         }
         
         .pricing-plan{
            flex: 1;
            max-width: 400px;
            padding: 25px;
            background-color: #f2f2f2;
            border-radius: 30px;
            text-align: center;
         }
         
         .plan-title{
            font-size: 35px;
            font-weight: bold;
            margin-bottom: 8px;
         }
         
         .plan-price{
            font-size: 65px;
            font-weight: bold;
            margin-bottom: 10px;
         } 
         
         .plan-features{
            list-style: none;
            padding: 0;
            margin: 0;         
         }
         
         .plan-features li{
            margin-bottom: 20px;   
         }
         
         .plan-button{
            padding: 10px;
            background-color: #ff6600;
            color: #fff;
            border-radius: 5px;
            border: none;
         }
         
         @media (max-width: 1250px){
            .pricing-container{
               flex-direction: column;
               height: 100%;   
            }
         }
            
      </style>
   </head>
   
   <body>
      <div class = "pricing-container">
         <div class = "pricing-plan"> 
            <div class = "plan-title"> Basic </div>
            <div class = "plan-price"> $11.99/month </div>
            <ul class = "plan-features"> 
               <li> ✅ 10GB Storage </li>
               <li> ✅ 1 User </li>
               <li> 🚫 Support </li>
            </ul>
            <a><button class = "plan-button"> Sign Up </button></a>
         </div>
         <div class = "pricing-plan">
            <div class = "plan-title"> Standard </div>
            <div class = "plan-price"> $19.99/month </div>
            <ul class = "plan-features">
               <li> ✅ 50GB Storage </li>
               <li> ✅ 5 Users </li>
               <li> ✅ Phone &amp; Email Support </li>   
            </ul>          
            <a><button class = "plan-button"> Sign Up </button></a>   
         </div>
         <div class = "pricing-plan">
            <div class = "plan-title"> Premium </div>
            <div class = "plan-price"> $49.99/month </div>
            <ul class = "plan-features">
               <li> ✅ 100GB Storage </li>
               <li> ✅ 10 Users </li>
               <li> ✅ 24/7 Support </li>   
            </ul>          
            <a><button class = "plan-button"> Sign Up </button></a>   
         </div>
      </div>
   </body>
</html>
