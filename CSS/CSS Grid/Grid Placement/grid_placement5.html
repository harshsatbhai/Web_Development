<!DOCTYPE html>
<html> 
   <head> 
      <meta charset = "UTF-8"/>
      <title> Grid Placement 3 </title>
      <style> 
      .container{
         height: 50vh;
         display: grid;
         gap: 1rem; 
         grid-template-rows: 1fr 1fr;
         grid-template-columns: 1fr 1fr 1.5fr;
      }
      .grid-item-1{
         background-color: blue;
         color: white;
         font-size: 30px;
         grid-column-start: 2;
         grid-column-end: 4;
         grid-row-start: 1;
         grid-row-end: 2; 
      }
      .grid-item-2{
         background-color: #E5833170;
         color: white;
         font-size: 30px;
         grid-area: 1 / 1 / 2 / 3;
      }
      </style>   
   </head>
   
   <body> 
      <div class = "container"> 
         <div class = "grid-item-1"> 1 </div>
         <div class = "grid-item-2"> 2 </div>
      </div>   
   </body>
</html>
