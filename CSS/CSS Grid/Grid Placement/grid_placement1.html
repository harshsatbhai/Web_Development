<!DOCTYPE html>
<html> 
   <head> 
      <meta charset = "UTF-8"/>
      <title> Grid Placement 1 </title>
      <style> 
      .container{
         height: 50vh;
         display: grid;
         gap: 3rem; /* rem size is relative to root element's(<html>) size i.e 16px */ 
         grid-template-rows: 1fr 1fr;
         grid-template-columns: 1fr 1fr 1.5fr;
      }
      .grid-item{
         background-color: blue;
         color: white;
         font-size: 30px;
      }
      </style>   
   </head>
   
   <body> 
      <div class = "container"> 
         <div class = "grid-item"> 1 </div>
         <div class = "grid-item"> 2 </div>
         <div class = "grid-item"> 3 </div>
      </div>   
   </body>
</html>
