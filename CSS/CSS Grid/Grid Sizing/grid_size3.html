<!DOCTYPE html>
<html> 
   <head> 
      <meta charset = "UTF-8"/>
      <title> Grid Sizing 3 </title>
      <style> 
      .container{
         display: grid;
         grid-template-rows: 100px 300px;
         grid-template-columns: 400px minmax(300px, 800px); /* The second column can have minimum 300px width and maximum 800px width */ 
         gap: 5px; 
      }
      .grid-item{
         background-color: blue;
         color: white;
         font-size: 30px;
      } 
      </style>   
   </head>
   
   <body> 
      <div class = "container"> 
         <div class = "grid-item"> 1 </div>
         <div class = "grid-item"> 2 </div>
         <div class = "grid-item"> 3 </div>
         <div class = "grid-item"> 4 </div>  
      </div>   
   </body>
</html>
