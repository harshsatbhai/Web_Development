<!DOCTYPE html>
<html> 
   <head> 
      <meta charset = "UTF-8"/>
      <title> Grid Sizing 1 </title>
      <style> 
      .container{
         display: grid;
         grid-template: 100px 200px / 400px 800px;
         gap: 5px;
      }
      .grid-item{
         background-color: blue;
         color: white;
         font-size: 30px;
      } 
      </style>   
   </head>
   
   <body> 
      <div class = "container"> 
         <div class = "grid-item"> 1 </div>
         <div class = "grid-item"> 2 </div>
         <div class = "grid-item"> 3 </div>
         <div class = "grid-item"> 4 </div>  
      </div>   
   </body>
</html>
