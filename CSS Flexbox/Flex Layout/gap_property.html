<!DOCTYPE html>
<html lang = "en">
   <head>
      <meta charset = "UTF-8">
      <title> Justify Content </title>
      <style>
         .container{
            display: flex;
            flex-flow: row wrap;
            justify-content: space-evenly;
            border: 2px solid black;
            color: white;
            gap: 10px 20px;
         }
         .red{
            background: red;
         }
         .blue{
            background: blue;
         }
         .green{
            background: green;
         }
         .cyan{
            background: cyan;
         }
         .brown{
            background: brown;
         }
         .yellow{
            background: yellow;
         }
         .orange{
            background: orange;
         }
         .violet{
            background: violet;
         }
         .pink{
            background: pink;
         }
         .indigo{
            background: indigo;
         }
      </style>
   </head>
   
   <body> 
      <div class = "container"> 
         <div class = "red"> Red </div>
         <div class = "blue"> Blue </div>
         <div class = "green"> Green </div>
         <div class = "cyan"> Cyan </div> 
         <div class = "brown"> Brown </div>
         <div class = "yellow"> Yellow </div>
         <div class = "orange"> Orange </div>
         <div class = "violet"> Violet </div>
         <div class = "pink"> Pink </div>
         <div class = "indigo"> Indigo </div>
      </div>   
   </body>
</html>
